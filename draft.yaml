models:
  Product:
    name: string:255
    description: longtext nullable
    soldCreateWise: boolean default:true
    is_active: boolean default:true
    relationships:
      hasMany: Purchase,Sale

  Region:
    name: string:255
    category: enum:purchase,sale
    relationships:
      hasMany: Customer,Supplier

  Supplier:
    name: string:255
    phone_number: string:255 nullable
    description : longtext nullable
    region_id: integer
    opening_balance: decimal:10,2
    relationships:
      belongsTo: Region
      hasMany: SupplierPayment,Purchase

  SupplierPayment:
    supplier_id: integer
    amount: integer nullable
    description : longtext nullable
    date: date
    type: enum:bank,cash
    relationships:
      belongsTo: Supplier
      hasMany: SupplierPayment

  Customer:
    name: string:255
    phone_number: string:255 nullable
    description : longtext nullable
    region_id: integer
    opening_balance: decimal:10,2
    category: enum:hotel,customer
    relationships:
      belongsTo: Region
      hasMany: Sale,CustomerPayment

  CustomerPayment:
    customer_id: integer
    amount: integer nullable
    description : longtext nullable
    type: enum:bank,cash
    date: date
    relationships:
      belongsTo: Customer

# Percentage of -2% of weight cut from  Punjab so if supplier selected from Punjabi percent field will be showed and that 2% will cut and form a total purchase amount
  Purchase:
    product_id: integer
    supplier_id: integer
    vehicle_no: integer nullable
    crate_qty: integer
    total_weight: integer
    weight_cut: integer nullable
    netweight: integer
    rate: integer nullable
    rate_date: date
    total_amount: integer nullable
    relationships:
      belongsTo: Product,Supplier

  Sale:
    product_id: integer
    customer_id: integer
    crate_qty: integer
    total_weight: integer
    weight_cut: integer nullable
    netweight: integer
    rate: integer
    total_amount: integer nullable
    relationships:
      belongsTo: Product,Customer








